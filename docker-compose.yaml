services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: booklit
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - booklit_pgdata:/var/lib/postgresql/data
    mem_limit: 256m
    command: >
      postgres -c shared_buffers=64MB -c max_connections=30
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d booklit"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -XX:+UseSerialGC"
      JDBC_DATABASE_URL: jdbc:postgresql://db:5432/booklit
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: ${APP_URL}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY}
    mem_limit: 512m
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  booklit_pgdata: