services:
  - type: web
    name: clube-livro
    runtime: docker
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: GOOGLE_BOOKS_API_KEY
        sync: false
